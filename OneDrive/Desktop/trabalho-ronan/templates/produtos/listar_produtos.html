{% extends "base.html" %}

{% block conteudo %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Listagem de Produtos</h2>
    <a href="{{ url_for('inserir_produto') }}" class="btn btn-success">Novo Produto</a>
</div>

<table class="table table-hover table-bordered align-middle">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Preço</th>
            <th>Estoque</th>
            <th>Categoria</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for produto in produtos %}
        <tr>
            <td>{{ produto.id }}</td>
            <td>{{ produto.nome }}</td>
            <td>R$ {{ produto.preco }}</td>
            <td>{{ produto.estoque }}</td>
            <td>{{ produto.categoria }}</td>
            <td>
                <a href="#" class="btn btn-sm btn-primary">Editar</a>
                <a href="{{ url_for('excluir_produto', id=produto.id) }}" class="btn btn-sm btn-danger" onclick="return confirmarExclusao()">Excluir</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
