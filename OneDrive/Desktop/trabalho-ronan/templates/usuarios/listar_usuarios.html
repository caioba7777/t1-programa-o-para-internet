{% extends "base.html" %}

{% block conteudo %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Listagem de Usuários</h2>
    <a href="{{ url_for('inserir_usuario') }}" class="btn btn-success">Novo Usuário</a>
</div>

<table class="table table-hover table-bordered align-middle">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>E-mail</th>
            <th>Perfil</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for usuario in usuarios %}
        <tr>
            <td>{{ usuario.id }}</td>
            <td>{{ usuario.nome }}</td>
            <td>{{ usuario.email }}</td>
            <td>{{ usuario.perfil }}</td>
            <td>
                <a href="#" class="btn btn-sm btn-primary">Editar</a>
                <a href="#" class="btn btn-sm btn-danger" onclick="return confirmarExclusao()">Excluir</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
