{% extends "base.html" %}

{% block conteudo %}
<h2 class="mb-4">Inserir Categoria</h2>

<form method="POST" class="card p-4 shadow-sm border-0">
    <div class="mb-3">
        <label for="nome" class="form-label">Nome da categoria</label>
        <input type="text" class="form-control" id="nome" name="nome" placeholder="Digite o nome da categoria">
    </div>

    <div class="mb-3">
        <label for="descricao" class="form-label">Descrição</label>
        <textarea class="form-control" id="descricao" name="descricao" rows="3" placeholder="Digite a descrição da categoria"></textarea>
    </div>

    <div class="mb-3">
        <label for="status" class="form-label">Status</label>
        <select class="form-select" id="status" name="status">
            <option value="">Selecione</option>
            <option>Ativa</option>
            <option>Inativa</option>
        </select>
    </div>

    <div class="mb-3">
        <label for="setor" class="form-label">Setor</label>
        <input type="text" class="form-control" id="setor" name="setor" placeholder="Digite o setor relacionado">
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="{{ url_for('listar_categorias') }}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>
{% endblock %}
